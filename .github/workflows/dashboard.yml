name: Real-Time Portfolio Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate metrics
        run: python profile_dashboard/scripts/metrics.py

      - name: Generate AI intelligence
        run: python profile_dashboard/scripts/ai_intelligence.py

      - name: Generate forecast
        run: python profile_dashboard/scripts/forecast.py

      - name: Generate learning recommendations
        run: python profile_dashboard/scripts/learning.py

      - name: Generate experiment tracker
        run: python profile_dashboard/scripts/experiments.py

      - name: Render README
        run: python profile_dashboard/scripts/render_readme.py

      - name: Sync README
        run: cp profile_dashboard/README.generated.md README.md

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md profile_dashboard/README.generated.md profile_dashboard/generated/*.json
          git diff --cached --quiet || git commit -m "chore: auto-update AI portfolio dashboard"
          git push
