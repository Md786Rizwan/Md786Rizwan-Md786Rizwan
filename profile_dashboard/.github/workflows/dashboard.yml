name: Update Profile Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Generate metrics
        run: python profile_dashboard/scripts/metrics.py

      - name: Render README
        run: python profile_dashboard/scripts/render_readme.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile_dashboard/README.generated.md profile_dashboard/generated/metrics.json
          git diff --cached --quiet || git commit -m "chore: auto-update profile dashboard"
          git push
